<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Desafio 10s — Castelão</title>

    <style>
        :root {
            --bg1: #070A12;
            --bg2: #0B1430;
            --stroke: #ffffff14;
            --text: #eaf0ff;
            --shadow: 0 28px 80px rgba(0, 0, 0, .55);
            --shadow2: 0 10px 30px rgba(0, 0, 0, .35);
            --glass: blur(14px) saturate(145%);
            --ok: #39ffb4;
            --mid: #ffd166;
            --bad: #ff3b6a;
        }

        * {
            box-sizing: border-box
        }

        html,
        body {
            height: 100%
        }

        body {
            margin: 0;
            font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
            color: var(--text);
            background:
                radial-gradient(1200px 900px at 20% 20%, rgba(255, 122, 24, .20), transparent 55%),
                radial-gradient(1000px 800px at 80% 20%, rgba(88, 168, 255, .14), transparent 60%),
                radial-gradient(900px 800px at 50% 95%, rgba(57, 255, 180, .10), transparent 55%),
                linear-gradient(180deg, var(--bg1), var(--bg2));
            overflow: hidden;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .wrap {
            height: 100%;
            display: grid;
            place-items: center;
            padding: 16px;
        }

        .card {
            width: min(1200px, 100%);
            height: min(820px, 100%);
            border-radius: 34px;
            border: 1px solid var(--stroke);
            background: linear-gradient(180deg, rgba(255, 255, 255, .07), rgba(255, 255, 255, .03));
            box-shadow: var(--shadow);
            backdrop-filter: var(--glass);
            -webkit-backdrop-filter: var(--glass);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: "";
            position: absolute;
            inset: -2px;
            background:
                radial-gradient(740px 260px at 16% 0%, rgba(255, 122, 24, .20), transparent 60%),
                radial-gradient(620px 260px at 86% 10%, rgba(88, 168, 255, .14), transparent 60%),
                radial-gradient(640px 320px at 55% 120%, rgba(57, 255, 180, .12), transparent 60%);
            filter: blur(18px);
            opacity: .9;
            pointer-events: none;
        }

        /* HEADER fixo e por cima (não invade o centro) */
        header {
            position: absolute;
            top: 16px;
            left: 16px;
            right: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            z-index: 10;
            pointer-events: auto;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border-radius: 22px;
            border: 1px solid rgba(255, 255, 255, .12);
            background: rgba(0, 0, 0, .18);
            box-shadow: var(--shadow2);
            max-width: min(620px, 70vw);
        }

        .logo {
            width: 72px;
            height: 72px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, .14);
            background: rgba(255, 255, 255, .06);
            display: grid;
            place-items: center;
            overflow: hidden;
            box-shadow: 0 14px 26px rgba(0, 0, 0, .35);
            flex: 0 0 auto;
        }

        .logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            padding: 10px;
            filter: drop-shadow(0 10px 12px rgba(0, 0, 0, .35));
        }

        .miniTitle {
            line-height: 1.15;
            min-width: 0;
        }

        .miniTitle b {
            font-size: 14px;
            letter-spacing: .4px;
            font-weight: 950;
            display: block;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .miniTitle span {
            display: block;
            margin-top: 4px;
            font-size: 12px;
            font-weight: 900;
            color: rgba(234, 240, 255, .75);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .topBtns {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .miniBtn {
            appearance: none;
            border: none;
            cursor: pointer;
            padding: 11px 12px;
            border-radius: 16px;
            font-weight: 950;
            color: rgba(234, 240, 255, .92);
            background: rgba(0, 0, 0, .18);
            border: 1px solid rgba(255, 255, 255, .12);
            box-shadow: var(--shadow2);
        }

        .miniBtn:active {
            transform: translateY(2px)
        }

        /* CENTRO: padding-top reservado para o header (não sobrepõe cronômetro) */
        .center {
            height: 100%;
            display: grid;
            place-items: center;
            padding: 160px 18px 34px 18px;
            /* <-- AQUI é a correção */
        }

        .timerCard {
            width: min(980px, 100%);
            border-radius: 36px;
            padding: 42px 22px 28px 22px;
            /* mais respiro */
            border: 1px solid rgba(255, 255, 255, .12);
            background: linear-gradient(180deg, rgba(255, 255, 255, .08), rgba(255, 255, 255, .02));
            box-shadow: 0 24px 65px rgba(0, 0, 0, .50);
            position: relative;
            overflow: hidden;
            text-align: center;
        }

        .timerCard::after {
            content: "";
            position: absolute;
            inset: -45%;
            background: conic-gradient(from 180deg,
                    rgba(255, 122, 24, .0),
                    rgba(255, 122, 24, .18),
                    rgba(88, 168, 255, .14),
                    rgba(57, 255, 180, .12),
                    rgba(255, 122, 24, .0));
            animation: spinGlow 6.5s linear infinite;
            filter: blur(28px);
            opacity: .70;
            pointer-events: none;
        }

        @keyframes spinGlow {
            to {
                transform: rotate(360deg)
            }
        }

        /* Cronômetro com margem extra para nunca encostar em cima */
        .digits {
            position: relative;
            z-index: 2;
            display: flex;
            align-items: baseline;
            justify-content: center;
            gap: 14px;
            font-variant-numeric: tabular-nums;
            text-shadow: 0 18px 50px rgba(0, 0, 0, .55);
            margin-top: 6px;
        }

        .main {
            font-size: clamp(96px, 12vw, 178px);
            font-weight: 1000;
            letter-spacing: 2px;
        }

        .ms {
            font-size: clamp(34px, 5.0vw, 58px);
            font-weight: 950;
            color: rgba(234, 240, 255, .90);
        }

        .status {
            position: relative;
            z-index: 2;
            margin: 18px auto 0 auto;
            width: min(720px, 100%);
            padding: 12px 14px;
            border-radius: 22px;
            border: 1px solid rgba(255, 255, 255, .12);
            background: rgba(0, 0, 0, .14);
            box-shadow: var(--shadow2);
            font-weight: 950;
            color: rgba(234, 240, 255, .92);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            min-height: 46px;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 99px;
            background: rgba(255, 255, 255, .35);
            box-shadow: 0 0 0 7px rgba(255, 255, 255, .08);
        }

        .status.topPrize .dot {
            background: var(--ok);
            box-shadow: 0 0 0 7px rgba(57, 255, 180, .12);
        }

        .status.midPrize .dot {
            background: var(--mid);
            box-shadow: 0 0 0 7px rgba(255, 209, 102, .12);
        }

        .status.lose .dot {
            background: var(--bad);
            box-shadow: 0 0 0 7px rgba(255, 59, 106, .12);
        }

        .status.topPrize {
            border-color: rgba(57, 255, 180, .22);
        }

        .status.midPrize {
            border-color: rgba(255, 209, 102, .22);
        }

        .status.lose {
            border-color: rgba(255, 59, 106, .22);
        }

        .actions {
            position: relative;
            z-index: 2;
            margin-top: 26px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
        }

        .mainBtn {
            width: min(320px, 74vw);
            aspect-ratio: 1 / 1;
            border-radius: 999px;
            border: 2px solid rgba(255, 255, 255, .18);
            color: #fff;
            font-weight: 1000;
            letter-spacing: .6px;
            font-size: clamp(18px, 2.6vw, 24px);
            cursor: pointer;
            display: grid;
            place-items: center;
            text-transform: uppercase;
            transition: transform .12s ease, filter .12s ease;
            box-shadow: 0 24px 60px rgba(0, 0, 0, .55);
        }

        .mainBtn:active {
            transform: translateY(3px) scale(.98);
        }

        .mainBtn.start {
            background:
                radial-gradient(circle at 30% 20%, rgba(255, 255, 255, .22), transparent 42%),
                radial-gradient(circle at 70% 80%, rgba(0, 0, 0, .25), transparent 55%),
                linear-gradient(180deg, rgba(88, 168, 255, 1), rgba(30, 90, 160, 1));
            box-shadow: 0 24px 60px rgba(0, 0, 0, .55), 0 0 0 12px rgba(88, 168, 255, .10);
        }

        .mainBtn.stop {
            background:
                radial-gradient(circle at 30% 20%, rgba(255, 255, 255, .25), transparent 42%),
                radial-gradient(circle at 70% 80%, rgba(0, 0, 0, .25), transparent 55%),
                linear-gradient(180deg, rgba(255, 59, 106, 1), rgba(178, 15, 62, 1));
            box-shadow: 0 24px 60px rgba(0, 0, 0, .55), 0 0 0 12px rgba(255, 59, 106, .10);
        }

        .smallBtn {
            appearance: none;
            border: none;
            cursor: pointer;
            padding: 14px 18px;
            border-radius: 18px;
            font-weight: 950;
            letter-spacing: .2px;
            color: rgba(234, 240, 255, .92);
            background: rgba(0, 0, 0, .18);
            border: 1px solid rgba(255, 255, 255, .12);
            box-shadow: var(--shadow2);
            min-width: min(340px, 78vw);
        }

        .smallBtn:active {
            transform: translateY(2px)
        }

        .pulseNear {
            animation: nearPulse .22s ease-in-out infinite;
        }

        @keyframes nearPulse {

            0%,
            100% {
                transform: translateY(0)
            }

            50% {
                transform: translateY(-2px)
            }
        }

        .foot {
            position: absolute;
            bottom: 12px;
            left: 16px;
            right: 16px;
            display: flex;
            justify-content: space-between;
            gap: 10px;
            flex-wrap: wrap;
            color: rgba(234, 240, 255, .62);
            font-size: 12px;
            font-weight: 900;
            z-index: 10;
        }

        @media (max-height: 680px) {
            .center {
                padding-top: 140px;
            }

            .logo {
                width: 64px;
                height: 64px
            }

            .mainBtn {
                width: min(280px, 70vw)
            }
        }

        @media (max-width: 720px) {
            .brand {
                max-width: 64vw;
            }
        }
    </style>
</head>

<body>
    <div class="wrap">
        <div class="card">

            <header>
                <div class="brand">
                    <div class="logo">
                        <img src="img/logo.png" alt="Logo Castelão"
                            onerror="this.style.display='none'; this.parentNode.innerHTML='🏪';" />
                    </div>
                    <div class="miniTitle">
                        <b>DESAFIO 10.00s</b>
                        <span>10.00 = prêmio TOP • 9.95–10.05 = prêmio menor</span>
                    </div>
                </div>

                <div class="topBtns">
                    <button class="miniBtn" id="btnFull" type="button">⛶ Tela cheia</button>
                </div>
            </header>

            <div class="center">
                <div class="timerCard" id="timerCard">
                    <div class="digits" aria-live="polite">
                        <div class="main" id="sec">00</div>
                        <div class="ms" id="ms">.00</div>
                    </div>

                    <div class="status" id="status">
                        <span class="dot"></span>
                        <span id="msg">Toque em INICIAR.</span>
                    </div>

                    <div class="actions">
                        <button class="mainBtn start" id="btnMain" type="button">INICIAR</button>
                        <button class="smallBtn" id="btnReset" type="button">↻ REINICIAR</button>
                        <button class="smallBtn" id="btnZero" type="button">⏹ ZERAR</button>
                    </div>
                </div>
            </div>

            <div class="foot">
                <div>Castelão • Desafio presencial</div>
                <div style="opacity:.85">Dica: treine no link da bio</div>
            </div>

        </div>
    </div>

    <script>
        const TOP = 10.00;
        const MINOR_MIN = 9.95;
        const MINOR_MAX = 10.05;

        let running = false;
        let startTs = 0;
        let raf = 0;
        let lastT = 0;

        const secEl = document.getElementById("sec");
        const msEl = document.getElementById("ms");
        const timerCard = document.getElementById("timerCard");

        const btnMain = document.getElementById("btnMain");
        const btnReset = document.getElementById("btnReset");
        const btnZero = document.getElementById("btnZero");
        const btnFull = document.getElementById("btnFull");

        const statusEl = document.getElementById("status");
        const msgEl = document.getElementById("msg");

        const pad2 = (n) => String(n).padStart(2, "0");

        function formatDisplay(t) {
            const cs = Math.round(t * 100);
            const s = Math.floor(cs / 100);
            const c = cs % 100;
            const str = `${pad2(Math.min(s, 99))}.${pad2(c)}`;
            return { str, value: cs / 100 };
        }

        function setStatus(kind, text) {
            statusEl.classList.remove("topPrize", "midPrize", "lose");
            if (kind) statusEl.classList.add(kind);
            msgEl.textContent = text;
        }

        function tick() {
            const now = performance.now();
            const t = (now - startTs) / 1000;
            lastT = t;

            const disp = formatDisplay(t);
            secEl.textContent = disp.str.slice(0, 2);
            msEl.textContent = disp.str.slice(2);

            const diff = Math.abs(10 - t);
            if (diff <= 0.22) timerCard.classList.add("pulseNear");
            else timerCard.classList.remove("pulseNear");

            raf = requestAnimationFrame(tick);
        }

        function start() {
            running = true;
            startTs = performance.now();
            btnMain.textContent = "PARAR";
            btnMain.classList.remove("start");
            btnMain.classList.add("stop");
            setStatus("", "Valendo!");
            timerCard.classList.remove("pulseNear");
            raf = requestAnimationFrame(tick);
        }

        function stop() {
            running = false;
            cancelAnimationFrame(raf);
            timerCard.classList.remove("pulseNear");

            const disp = formatDisplay(lastT);
            const isTop = (disp.value === TOP);
            const isMinor = (disp.value >= MINOR_MIN && disp.value <= MINOR_MAX);

            if (isTop) {
                setStatus("topPrize", "CRAVOU 10.00! Prêmio TOP 🎉");
            } else if (isMinor) {
                setStatus("midPrize", `Quase perfeito: ${disp.str} • Prêmio menor ✅`);
            } else {
                setStatus("lose", `Parou em ${disp.str}`);
            }

            btnMain.textContent = "INICIAR";
            btnMain.classList.remove("stop");
            btnMain.classList.add("start");
        }

        function reset() {
            running = false;
            cancelAnimationFrame(raf);
            lastT = 0;

            secEl.textContent = "00";
            msEl.textContent = ".00";

            btnMain.textContent = "INICIAR";
            btnMain.classList.remove("stop");
            btnMain.classList.add("start");

            setStatus("", "Toque em INICIAR.");
            timerCard.classList.remove("pulseNear");
        }

        function zero() {
            running = false;
            cancelAnimationFrame(raf);
            lastT = 0;

            secEl.textContent = "00";
            msEl.textContent = ".00";
            timerCard.classList.remove("pulseNear");

            btnMain.textContent = "INICIAR";
            btnMain.classList.remove("stop");
            btnMain.classList.add("start");
        }

        btnMain.addEventListener("click", () => { running ? stop() : start(); });
        btnReset.addEventListener("click", reset);
        btnZero.addEventListener("click", zero);

        btnFull.addEventListener("click", async () => {
            try {
                if (!document.fullscreenElement) await document.documentElement.requestFullscreen();
                else await document.exitFullscreen();
            } catch (e) { }
        });

        reset();
    </script>
</body>

</html>
