<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio 10 segundos</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            height: 100svh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(180deg, #120c1f, #0a0715);
            color: white;
        }

        /* CONTAINER */

        .container {
            width: 100%;
            max-width: 600px;
            height: 100%;
            display: grid;
            grid-template-rows: auto 1fr auto;
            padding: 12px;
            gap: 10px;
        }

        /* HEADER */

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 12px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(8px);
        }

        .logoArea {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo {
            width: 40px;
            height: 40px;
            border-radius: 10px;
        }

        .title {
            font-size: 14px;
            font-weight: bold;
        }

        .subtitle {
            font-size: 12px;
            opacity: 0.7;
        }

        .full {
            font-size: 13px;
            padding: 8px 12px;
            border-radius: 12px;
            border: none;
            background: rgba(255, 255, 255, 0.08);
            color: white;
        }

        /* MAIN */

        .main {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 14px;
        }

        /* TIMER */

        .timer {
            display: flex;
            align-items: flex-end;
            font-weight: bold;
        }

        .timer .sec {
            font-size: clamp(60px, 13vw, 110px);
        }

        .timer .dot {
            font-size: clamp(22px, 5vw, 40px);
            margin: 0 5px;
        }

        .timer .ms {
            font-size: clamp(36px, 8vw, 70px);
        }

        /* STATUS */

        .status {
            padding: 10px 16px;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.08);
            font-weight: bold;
            font-size: 14px;
        }

        /* BOTÃO */

        .bigButton {

            --size: clamp(200px, 34svh, 300px);

            width: var(--size);
            height: var(--size);

            border-radius: 50%;
            border: none;

            display: flex;
            align-items: center;
            justify-content: center;

            font-size: clamp(20px, 5vw, 28px);
            font-weight: bold;

            background: linear-gradient(180deg, #4a3d77, #2a2148);

            box-shadow:
                0 20px 50px rgba(0, 0, 0, 0.6),
                inset 0 0 0 2px rgba(255, 255, 255, 0.1);
        }

        .bigButton.stop {
            background: linear-gradient(180deg, #ff3a3a, #b00000);
        }

        /* RESET */

        .reset {
            padding: 14px;
            border: none;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.08);
            width: 100%;
            font-weight: bold;
        }

        /* FOOTER */

        .footer {
            text-align: center;
            font-size: 12px;
            opacity: 0.7;
        }
    </style>
</head>

<body>

    <div class="container">

        <header class="header">

            <div class="logoArea">

                <img class="logo" src="https://i.imgur.com/8QfQYpL.png">

                <div>
                    <div class="title">DESAFIO 10.00s</div>
                    <div class="subtitle">10.00 prêmio TOP • 9.95–10.05 prêmio menor</div>
                </div>

            </div>

            <button class="full" onclick="toggleFull()">Tela cheia</button>

        </header>


        <div class="main">

            <div class="timer">
                <div class="sec" id="sec">00</div>
                <div class="dot">.</div>
                <div class="ms" id="ms">00</div>
            </div>

            <div class="status" id="status">Toque em INICIAR para começar</div>

            <button class="bigButton" id="btn">INICIAR</button>

            <button class="reset" onclick="reset()">REINICIAR</button>

        </div>


        <div class="footer">
            Castelão • Desafio presencial • Dica: treine no link da bio
        </div>

    </div>


    <script>

        let running = false
        let startTime = 0
        let elapsed = 0
        let raf

        const sec = document.getElementById("sec")
        const ms = document.getElementById("ms")
        const btn = document.getElementById("btn")
        const status = document.getElementById("status")

        function update() {

            let now = performance.now()
            let time = elapsed + (now - startTime) / 1000

            let s = Math.floor(time)
            let c = Math.floor((time % 1) * 100)

            sec.innerText = String(s).padStart(2, "0")
            ms.innerText = String(c).padStart(2, "0")

            raf = requestAnimationFrame(update)

        }

        btn.onclick = () => {

            if (!running) {

                running = true
                startTime = performance.now()
                btn.innerText = "PARAR"
                btn.classList.add("stop")

                status.innerText = "Valendo! Tente parar em 10.00"

                update()

            } else {

                running = false
                cancelAnimationFrame(raf)

                elapsed += (performance.now() - startTime) / 1000

                let result = Math.round(elapsed * 100) / 100

                if (result == 10) {

                    status.innerText = "CRAVOU 10.00 🎉 PRÊMIO TOP"

                } else if (result >= 9.95 && result <= 10.05) {

                    status.innerText = "Parou em " + result.toFixed(2) + " • prêmio menor"

                } else {

                    status.innerText = "Parou em " + result.toFixed(2) + " • tente novamente"

                }

                btn.innerText = "INICIAR"
                btn.classList.remove("stop")

            }

        }

        function reset() {

            running = false
            cancelAnimationFrame(raf)

            elapsed = 0
            sec.innerText = "00"
            ms.innerText = "00"

            btn.innerText = "INICIAR"
            btn.classList.remove("stop")

            status.innerText = "Toque em INICIAR para começar"

        }

        function toggleFull() {

            if (!document.fullscreenElement) {

                document.documentElement.requestFullscreen()

            } else {

                document.exitFullscreen()

            }

        }

    </script>

</body>

</html>
