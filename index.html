<!doctype html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Cronômetro Castelão • Desafio 10.00s</title>

    <style>
        /* =========================
       TEMA (mantido no estilo “claro + azul + laranja”)
       ========================= */
        :root {
            --bg: #eef3f9;
            --shadow: rgba(0, 0, 0, .18);

            --navA: #0a3a55;
            --navB: #0b4a6b;

            --card: rgba(255, 255, 255, .85);
            --stroke: rgba(10, 58, 85, .16);

            --text: #0a2e44;
            --muted: rgba(10, 46, 68, .70);

            --orangeA: #ff8b22;
            --orangeB: #ea6e14;

            --redA: #ff3b3b;
            --redB: #e42828;

            --good: rgba(0, 160, 90, .14);
            --warn: rgba(255, 165, 0, .14);
            --bad: rgba(255, 60, 60, .14);
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
        }

        body {
            margin: 0;
            overflow: hidden;
            /* sem rolagem */
            font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
            background:
                radial-gradient(1200px 900px at 50% 20%, rgba(255, 140, 40, .12), transparent 58%),
                radial-gradient(1100px 850px at 20% 70%, rgba(10, 74, 107, .12), transparent 60%),
                linear-gradient(180deg, #f6f9ff, var(--bg));
            color: var(--text);
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            touch-action: manipulation;
        }

        /* =========================
       LAYOUT SEM ROLAGEM
       ========================= */
        .app {
            height: 100svh;
            height: 100dvh;
            display: grid;
            grid-template-rows: auto 1fr auto;
            gap: 10px;
            padding: env(safe-area-inset-top) 14px env(safe-area-inset-bottom) 14px;
            max-width: 720px;
            margin: 0 auto;
        }

        /* =========================
       HEADER
       ========================= */
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 14px 14px;
            border-radius: 18px;
            background: linear-gradient(180deg, var(--navB), var(--navA));
            box-shadow: 0 16px 40px var(--shadow);
            color: #fff;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 0;
        }

        .brandLogo {
            width: 54px;
            height: 54px;
            border-radius: 16px;
            background: rgba(255, 255, 255, .92);
            padding: 6px;
            object-fit: contain;
            flex: 0 0 auto;
            box-shadow: inset 0 0 0 1px rgba(0, 0, 0, .10);
        }

        .brandText {
            min-width: 0;
            line-height: 1.15;
        }

        .title {
            font-weight: 900;
            letter-spacing: .3px;
            font-size: 18px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .subtitle {
            margin-top: 4px;
            font-size: 15px;
            opacity: .92;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .fullBtn {
            flex: 0 0 auto;
            border: 0;
            padding: 14px 16px;
            border-radius: 18px;
            font-weight: 900;
            letter-spacing: .2px;
            color: #fff;
            background: linear-gradient(180deg, #f08b2a, #d97214);
            box-shadow: 0 12px 26px rgba(0, 0, 0, .18);
        }

        .fullBtn:active {
            transform: scale(.98);
        }

        /* =========================
       MAIN
       ========================= */
        .main {
            min-height: 0;
            display: grid;
            grid-template-rows: auto 1fr auto;
            gap: 12px;
            align-items: center;
        }

        /* Timer */
        .timerWrap {
            display: grid;
            gap: 12px;
            justify-items: center;
            align-items: center;
            padding-top: 2px;
        }

        .timer {
            display: flex;
            align-items: baseline;
            justify-content: center;
            line-height: 1;
            font-weight: 950;
            letter-spacing: 1px;
            color: var(--text);
        }

        .timer .sec {
            font-size: clamp(64px, 14vw, 120px);
        }

        .timer .dot {
            font-size: clamp(22px, 6vw, 46px);
            margin: 0 6px;
            opacity: .9;
        }

        .timer .ms {
            font-size: clamp(34px, 9vw, 78px);
            opacity: .98;
        }

        /* Status */
        .statusPill {
            width: min(560px, 92%);
            padding: 14px 16px;
            border-radius: 999px;
            background: rgba(255, 255, 255, .92);
            border: 1px solid var(--stroke);
            box-shadow: 0 14px 30px rgba(0, 0, 0, .10);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-weight: 900;
            color: var(--text);
        }

        .statusDot {
            width: 10px;
            height: 10px;
            border-radius: 999px;
            background: rgba(10, 46, 68, .35);
            box-shadow: 0 0 0 4px rgba(10, 46, 68, .10);
        }

        .statusPill.good {
            background: rgba(0, 160, 90, .10);
            border-color: rgba(0, 160, 90, .20);
        }

        .statusPill.good .statusDot {
            background: #00a05a;
            box-shadow: 0 0 0 4px rgba(0, 160, 90, .18);
        }

        .statusPill.warn {
            background: rgba(255, 165, 0, .10);
            border-color: rgba(255, 165, 0, .22);
        }

        .statusPill.warn .statusDot {
            background: #ffa500;
            box-shadow: 0 0 0 4px rgba(255, 165, 0, .18);
        }

        .statusPill.bad {
            background: rgba(255, 60, 60, .10);
            border-color: rgba(255, 60, 60, .22);
        }

        .statusPill.bad .statusDot {
            background: #ff3b3b;
            box-shadow: 0 0 0 4px rgba(255, 60, 60, .18);
        }

        /* =========================
       BOTÃO PRINCIPAL (proporcional no mobile)
       ========================= */
        .bigBtn {
            justify-self: center;

            /* ✅ tamanho segue ALTURA real (resolve desproporção) */
            --btn: clamp(210px, 36svh, 380px);
            width: var(--btn);
            height: var(--btn);

            border: 0;
            border-radius: 999px;
            background:
                radial-gradient(700px 520px at 35% 25%, rgba(255, 255, 255, .22), transparent 58%),
                radial-gradient(700px 520px at 70% 75%, rgba(0, 0, 0, .18), transparent 62%),
                linear-gradient(180deg, var(--orangeA), var(--orangeB));
            box-shadow:
                0 26px 50px rgba(0, 0, 0, .18),
                inset 0 0 0 10px rgba(255, 255, 255, .12);
            color: #fff;
            font-weight: 950;
            letter-spacing: 1px;
            font-size: clamp(18px, 5vw, 34px);
        }

        .bigBtn:active {
            transform: scale(.985);
        }

        .bigBtn.stop {
            background:
                radial-gradient(700px 520px at 35% 25%, rgba(255, 255, 255, .18), transparent 58%),
                radial-gradient(700px 520px at 70% 75%, rgba(0, 0, 0, .18), transparent 62%),
                linear-gradient(180deg, var(--redA), var(--redB));
        }

        /* Reiniciar */
        .resetBtn {
            justify-self: center;
            width: min(640px, 92%);
            padding: 18px 16px;
            border-radius: 18px;
            border: 0;
            background: linear-gradient(180deg, var(--navB), var(--navA));
            color: #fff;
            font-weight: 950;
            letter-spacing: .6px;
            box-shadow: 0 18px 40px rgba(0, 0, 0, .16);
        }

        .resetBtn:active {
            transform: scale(.99);
        }

        /* Rodapé */
        .footNote {
            text-align: center;
            font-size: 14px;
            color: rgba(10, 46, 68, .65);
            padding: 6px 10px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .sep {
            opacity: .55;
            margin: 0 8px;
        }

        /* =========================
       MODO COMPACTO (telas baixas)
       ========================= */
        @media (max-height: 740px) {
            .app {
                gap: 8px;
            }

            .topbar {
                padding: 12px 12px;
                border-radius: 16px;
            }

            .brandLogo {
                width: 48px;
                height: 48px;
                border-radius: 14px;
            }

            .title {
                font-size: 16px;
            }

            .subtitle {
                font-size: 13px;
            }

            .fullBtn {
                padding: 12px 14px;
                border-radius: 16px;
            }

            .timerWrap {
                gap: 10px;
            }

            .statusPill {
                padding: 12px 14px;
            }

            .bigBtn {
                --btn: clamp(190px, 34svh, 330px);
            }

            .resetBtn {
                padding: 16px 14px;
            }

            .footNote {
                font-size: 13px;
            }
        }

        @media (min-width: 768px) {
            .app {
                padding: 18px;
                gap: 14px;
            }

            .topbar {
                border-radius: 22px;
            }

            .bigBtn {
                --btn: clamp(280px, 40svh, 430px);
            }
        }
    </style>
</head>

<body>
    <div class="app">
        <header class="topbar">
            <div class="brand">
                <!-- Troque o src pela SUA logo -->
                <img class="brandLogo" src="img/logo.png" alt="Castelão" />
                <div class="brandText">
                    <div class="title">DESAFIO 10.00s</div>
                    <div class="subtitle">10.00 = prêmio TOP • 9.95–10.05 = prêmio menor</div>
                </div>
            </div>

            <button class="fullBtn" id="fullBtn" type="button">Tela cheia</button>
        </header>

        <main class="main">
            <div class="timerWrap">
                <div class="timer" aria-label="Cronômetro">
                    <span class="sec" id="sec">00</span>
                    <span class="dot">.</span>
                    <span class="ms" id="ms">00</span>
                </div>

                <div class="statusPill" id="statusPill">
                    <span class="statusDot"></span>
                    <span id="statusText">Toque em INICIAR para começar</span>
                </div>
            </div>

            <button class="bigBtn" id="toggleBtn" type="button">INICIAR</button>

            <button class="resetBtn" id="resetBtn" type="button">REINICIAR</button>
        </main>

        <footer class="footNote">
            Castelão • Desafio presencial <span class="sep">•</span> Dica: treine no link da bio
        </footer>
    </div>

    <script>
        // =========================
        // CONFIG DO DESAFIO
        // =========================
        const TARGET = 10.00;
        const TOL_MIN = 9.95;
        const TOL_MAX = 10.05;

        // =========================
        // ELEMENTOS
        // =========================
        const secEl = document.getElementById('sec');
        const msEl = document.getElementById('ms');
        const toggleBtn = document.getElementById('toggleBtn');
        const resetBtn = document.getElementById('resetBtn');
        const statusText = document.getElementById('statusText');
        const statusPill = document.getElementById('statusPill');
        const fullBtn = document.getElementById('fullBtn');

        // =========================
        // ESTADO
        // =========================
        let running = false;
        let rafId = null;
        let startAt = 0;   // performance.now() ao iniciar
        let elapsed = 0;   // segundos acumulados ao parar

        // =========================
        // HELPERS
        // =========================
        const pad2 = (n) => String(n).padStart(2, '0');

        // Render “SS.CC” (centésimos) SEM conflito
        function render(seconds) {
            const s = Math.floor(seconds) % 60;
            const cent = Math.floor((seconds - Math.floor(seconds)) * 100 + 1e-9);
            secEl.textContent = pad2(s);
            msEl.textContent = pad2(cent);
        }

        function setStatus(type, text) {
            statusPill.classList.remove('good', 'warn', 'bad');
            if (type) statusPill.classList.add(type);
            statusText.textContent = text;
        }

        function loop() {
            if (!running) return;
            const now = performance.now();
            const current = elapsed + (now - startAt) / 1000;
            render(current);
            rafId = requestAnimationFrame(loop);
        }

        // seconds aqui JÁ vem com 2 casas (travado)
        function evaluateResult(seconds) {
            const v = seconds;

            if (v === TARGET) {
                setStatus('good', `CRAVOU ${v.toFixed(2)} • prêmio TOP`);
                return;
            }

            if (v >= TOL_MIN && v <= TOL_MAX) {
                setStatus('warn', `Parou em ${v.toFixed(2)} • prêmio menor`);
                return;
            }

            setStatus('bad', `Parou em ${v.toFixed(2)} • tente de novo`);
        }

        // =========================
        // AÇÕES
        // =========================
        function start() {
            if (running) return;

            running = true;
            toggleBtn.textContent = 'PARAR';
            toggleBtn.classList.add('stop');

            setStatus('', 'Valendo! Tenta cravar 10.00');
            startAt = performance.now();
            rafId = requestAnimationFrame(loop);
        }

        function stop() {
            if (!running) return;

            running = false;

            const now = performance.now();
            elapsed = elapsed + (now - startAt) / 1000;

            if (rafId) cancelAnimationFrame(rafId);
            rafId = null;

            // ✅ TRAVA UM ÚNICO VALOR (2 casas) e usa em tudo
            const final = Math.round(elapsed * 100) / 100;

            elapsed = final;  // garante que o valor exibido é o mesmo armazenado
            render(final);
            evaluateResult(final);

            toggleBtn.textContent = 'INICIAR';
            toggleBtn.classList.remove('stop');
        }

        function reset() {
            running = false;
            if (rafId) cancelAnimationFrame(rafId);
            rafId = null;

            elapsed = 0;
            startAt = 0;

            toggleBtn.textContent = 'INICIAR';
            toggleBtn.classList.remove('stop');

            render(0);
            setStatus('', 'Toque em INICIAR para começar');
        }

        // =========================
        // EVENTOS
        // =========================
        toggleBtn.addEventListener('click', () => {
            if (!running) start();
            else stop();
        });

        resetBtn.addEventListener('click', reset);

        // Tela cheia (quando permitido)
        fullBtn.addEventListener('click', async () => {
            try {
                const root = document.documentElement;
                if (!document.fullscreenElement) {
                    await root.requestFullscreen?.();
                    if (screen.orientation?.lock) {
                        try { await screen.orientation.lock('portrait'); } catch (e) { }
                    }
                } else {
                    await document.exitFullscreen?.();
                }
            } catch (e) { }
        });

        // Mantém display coerente em mudanças de barra do navegador
        window.addEventListener('resize', () => {
            const current = running
                ? (elapsed + (performance.now() - startAt) / 1000)
                : elapsed;
            render(current);
        });

        // init
        reset();
    </script>
</body>

</html>
