<!doctype html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Cronômetro Castelão • Desafio 10.00s</title>

    <style>
        :root {
            --bg1: #0b1220;
            --bg2: #0a1a2b;

            --text: #0b2a3a;
            --muted: rgba(11, 42, 58, .65);

            --card: rgba(255, 255, 255, .92);
            --card2: rgba(255, 255, 255, .72);
            --stroke: rgba(0, 0, 0, .06);

            --blueA: #0b4a63;
            --blueB: #083b53;

            --orangeA: #ff9a2a;
            --orangeB: #e87512;

            --shadow: 0 18px 45px rgba(0, 0, 0, .18);

            /* botão (JS ajusta) */
            --btn: 260px;
            --gap: 14px;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
        }

        body {
            margin: 0;
            overflow: hidden;
            /* sem rolagem */
            font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
            background:
                radial-gradient(900px 700px at 20% 15%, rgba(255, 160, 60, .14), transparent 60%),
                radial-gradient(900px 700px at 85% 25%, rgba(60, 160, 255, .16), transparent 62%),
                linear-gradient(180deg, #eef3f7, #dfe8ef);
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            touch-action: manipulation;
            color: var(--text);
        }

        .app {
            height: 100svh;
            height: 100dvh;
            display: grid;
            grid-template-rows: auto 1fr auto;
            gap: 12px;
            padding: env(safe-area-inset-top) 14px env(safe-area-inset-bottom) 14px;
            max-width: 820px;
            margin: 0 auto;
        }

        /* ===== TOPBAR ===== */
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 14px 14px;
            border-radius: 22px;
            background: linear-gradient(180deg, var(--blueA), var(--blueB));
            box-shadow: var(--shadow);
            color: #fff;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 0;
        }

        .brandLogo {
            width: 54px;
            height: 54px;
            border-radius: 16px;
            object-fit: cover;
            background: rgba(255, 255, 255, .20);
            border: 1px solid rgba(255, 255, 255, .22);
            box-shadow: inset 0 0 0 1px rgba(0, 0, 0, .15);
            flex: 0 0 auto;
        }

        .brandText {
            min-width: 0;
        }

        .title {
            font-weight: 950;
            letter-spacing: .4px;
            font-size: 20px;
            line-height: 1.1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .subtitle {
            margin-top: 6px;
            font-size: 16px;
            opacity: .92;
            line-height: 1.15;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .fullBtn {
            border: 0;
            padding: 14px 18px;
            border-radius: 18px;
            background: linear-gradient(180deg, rgba(255, 154, 42, .96), rgba(232, 117, 18, .96));
            color: #fff;
            font-weight: 950;
            letter-spacing: .2px;
            box-shadow: 0 14px 26px rgba(0, 0, 0, .22);
            min-width: 120px;
            cursor: pointer;
        }

        .fullBtn:active {
            transform: scale(.98);
        }

        /* ===== MAIN (flex pra sobrar espaço pro botão) ===== */
        .main {
            min-height: 0;
            display: flex;
            flex-direction: column;
            gap: var(--gap);
            align-items: center;
            justify-content: space-between;
            /* distribui: topo (timerWrap) / meio (btn) / baixo (reset) */
            padding: 6px 0;
        }

        /* Timer + status */
        .timerWrap {
            width: 100%;
            display: grid;
            gap: 14px;
            justify-items: center;
        }

        .timer {
            display: flex;
            align-items: baseline;
            justify-content: center;
            font-weight: 950;
            letter-spacing: 1px;
            line-height: 1;
            text-shadow: 0 10px 25px rgba(0, 0, 0, .10);
        }

        /* tamanho ajustado “bonito” (JS resolve o botão, então aqui pode ser estável) */
        .timer .sec {
            font-size: clamp(64px, 14vw, 128px);
        }

        .timer .dot {
            font-size: clamp(26px, 6vw, 54px);
            margin: 0 10px;
            opacity: .9;
        }

        .timer .ms {
            font-size: clamp(40px, 9vw, 86px);
            opacity: .95;
        }

        .statusPill {
            width: min(640px, 92%);
            padding: 14px 18px;
            border-radius: 999px;
            background: var(--card);
            border: 1px solid var(--stroke);
            box-shadow: 0 16px 35px rgba(0, 0, 0, .10);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-weight: 900;
            color: rgba(11, 42, 58, .92);
            text-align: center;
        }

        .statusDot {
            width: 12px;
            height: 12px;
            border-radius: 999px;
            background: rgba(11, 42, 58, .30);
            box-shadow: 0 0 0 5px rgba(11, 42, 58, .08);
            flex: 0 0 auto;
        }

        .statusPill.good {
            background: rgba(0, 255, 140, .14);
        }

        .statusPill.good .statusDot {
            background: #00d978;
            box-shadow: 0 0 0 5px rgba(0, 217, 120, .18);
        }

        .statusPill.warn {
            background: rgba(255, 185, 0, .16);
        }

        .statusPill.warn .statusDot {
            background: #ffb900;
            box-shadow: 0 0 0 5px rgba(255, 185, 0, .18);
        }

        .statusPill.bad {
            background: rgba(255, 60, 60, .14);
        }

        .statusPill.bad .statusDot {
            background: #ff3b3b;
            box-shadow: 0 0 0 5px rgba(255, 60, 60, .18);
        }

        /* ===== BOTÃO PRINCIPAL (tamanho vem do JS via --btn) ===== */
        .bigBtn {
            width: var(--btn);
            height: var(--btn);
            border-radius: 999px;
            border: 0;
            cursor: pointer;
            color: #fff;
            font-weight: 950;
            letter-spacing: 1px;
            font-size: clamp(18px, 4.8vw, 30px);
            display: grid;
            place-items: center;

            background:
                radial-gradient(600px 500px at 35% 30%, rgba(255, 255, 255, .22), transparent 55%),
                radial-gradient(600px 500px at 65% 75%, rgba(0, 0, 0, .18), transparent 55%),
                linear-gradient(180deg, var(--orangeA), var(--orangeB));

            box-shadow:
                0 30px 70px rgba(0, 0, 0, .22),
                inset 0 0 0 10px rgba(255, 255, 255, .18);
            transform: translateZ(0);
        }

        .bigBtn:active {
            transform: scale(.985);
        }

        .bigBtn.stop {
            background:
                radial-gradient(600px 500px at 35% 30%, rgba(255, 255, 255, .18), transparent 55%),
                radial-gradient(600px 500px at 65% 75%, rgba(0, 0, 0, .22), transparent 55%),
                linear-gradient(180deg, rgba(255, 47, 47, .82), rgba(215, 20, 20, .78));
        }

        /* ===== RESET ===== */
        .resetBtn {
            width: min(680px, 92%);
            padding: 18px 18px;
            border-radius: 22px;
            border: 0;
            background: linear-gradient(180deg, var(--blueA), var(--blueB));
            color: #fff;
            font-weight: 950;
            letter-spacing: .7px;
            box-shadow: var(--shadow);
            cursor: pointer;
        }

        .resetBtn:active {
            transform: scale(.99);
        }

        /* ===== FOOTER ===== */
        .footNote {
            text-align: center;
            font-size: 14px;
            color: rgba(11, 42, 58, .65);
            padding: 4px 10px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .sep {
            opacity: .5;
            margin: 0 10px;
        }

        /* Ajustes rápidos p/ telas bem baixas (só refinam, não “quebram”) */
        @media (max-height: 740px) {
            :root {
                --gap: 12px;
            }

            .topbar {
                padding: 12px;
                border-radius: 20px;
            }

            .brandLogo {
                width: 48px;
                height: 48px;
            }

            .title {
                font-size: 18px;
            }

            .subtitle {
                font-size: 14px;
            }

            .statusPill {
                padding: 12px 14px;
            }

            .resetBtn {
                padding: 16px;
            }

            .footNote {
                font-size: 12px;
            }
        }
    </style>
</head>

<body>
    <div class="app" id="app">
        <header class="topbar" id="topbar">
            <div class="brand">
                <!-- Troque pela sua logo -->
                <img class="brandLogo" src="img/logo.png" alt="Castelão" />
                <div class="brandText">
                    <div class="title">DESAFIO 10.00s</div>
                    <div class="subtitle">10.00 = prêmio TOP • 9.95–10.05 = prêmio menor</div>
                </div>
            </div>

            <button class="fullBtn" id="fullBtn" type="button">Tela cheia</button>
        </header>

        <main class="main" id="main">
            <div class="timerWrap" id="timerWrap">
                <div class="timer" aria-label="Cronômetro">
                    <span class="sec" id="sec">00</span>
                    <span class="dot">.</span>
                    <span class="ms" id="ms">00</span>
                </div>

                <div class="statusPill" id="statusPill">
                    <span class="statusDot"></span>
                    <span id="statusText">Toque em INICIAR para começar</span>
                </div>
            </div>

            <button class="bigBtn" id="toggleBtn" type="button">INICIAR</button>

            <button class="resetBtn" id="resetBtn" type="button">REINICIAR</button>
        </main>

        <footer class="footNote" id="footNote">
            Castelão <span class="sep">•</span> Desafio presencial <span class="sep">•</span> Dica: treine no link da
            bio
        </footer>
    </div>

    <script>
        // ======= CONFIG DO DESAFIO =======
        const TARGET = 10.00;
        const TOL_MIN = 9.95;
        const TOL_MAX = 10.05;

        // ======= ELEMENTOS =======
        const app = document.getElementById('app');
        const topbar = document.getElementById('topbar');
        const main = document.getElementById('main');
        const timerWrap = document.getElementById('timerWrap');
        const toggleBtn = document.getElementById('toggleBtn');
        const resetBtn = document.getElementById('resetBtn');
        const footNote = document.getElementById('footNote');

        const secEl = document.getElementById('sec');
        const msEl = document.getElementById('ms');

        const statusText = document.getElementById('statusText');
        const statusPill = document.getElementById('statusPill');

        const fullBtn = document.getElementById('fullBtn');

        // ======= ESTADO =======
        let running = false;
        let rafId = null;
        let startAt = 0;
        let elapsed = 0;

        // ======= HELPERS =======
        function pad2(n) { return String(n).padStart(2, '0'); }

        function render(seconds) {
            const s = Math.floor(seconds) % 60;
            const cent = Math.floor((seconds - Math.floor(seconds)) * 100 + 1e-9);
            secEl.textContent = pad2(s);
            msEl.textContent = pad2(cent);
        }

        function setStatus(type, text) {
            statusPill.classList.remove('good', 'warn', 'bad');
            if (type) statusPill.classList.add(type);
            statusText.textContent = text;
        }

        function loop() {
            if (!running) return;
            const now = performance.now();
            const current = elapsed + (now - startAt) / 1000;
            render(current);
            rafId = requestAnimationFrame(loop);
        }

        // seconds já vem com 2 casas
        function evaluateResult(seconds) {
            const v = seconds;

            if (v === TARGET) {
                setStatus('good', `CRAVOU ${v.toFixed(2)}! 🎉 Prêmio TOP`);
                return;
            }

            if (v >= TOL_MIN && v <= TOL_MAX) {
                setStatus('warn', `Parou em ${v.toFixed(2)} • prêmio menor`);
                return;
            }

            setStatus('bad', `Parou em ${v.toFixed(2)} • tente de novo`);
        }

        function start() {
            if (running) return;
            running = true;

            toggleBtn.textContent = 'PARAR';
            toggleBtn.classList.add('stop');

            setStatus('', 'Valendo! Tenta cravar 10.00');
            startAt = performance.now();
            rafId = requestAnimationFrame(loop);
        }

        function stop() {
            if (!running) return;
            running = false;

            const now = performance.now();
            elapsed = elapsed + (now - startAt) / 1000;

            if (rafId) cancelAnimationFrame(rafId);
            rafId = null;

            // ✅ trava um único valor final (2 casas) pra display e mensagem
            const final = Math.round(elapsed * 100) / 100;

            elapsed = final;     // mantém consistência se voltar a rodar
            render(final);
            evaluateResult(final);

            toggleBtn.textContent = 'INICIAR';
            toggleBtn.classList.remove('stop');
        }

        function reset() {
            running = false;
            if (rafId) cancelAnimationFrame(rafId);
            rafId = null;

            elapsed = 0;
            startAt = 0;

            toggleBtn.textContent = 'INICIAR';
            toggleBtn.classList.remove('stop');

            render(0);
            setStatus('', 'Toque em INICIAR para começar');
        }

        toggleBtn.addEventListener('click', () => running ? stop() : start());
        resetBtn.addEventListener('click', reset);

        // ======= FULLSCREEN =======
        fullBtn.addEventListener('click', async () => {
            try {
                const root = document.documentElement;
                if (!document.fullscreenElement) {
                    await root.requestFullscreen?.();
                    if (screen.orientation && screen.orientation.lock) {
                        try { await screen.orientation.lock('portrait'); } catch (e) { }
                    }
                } else {
                    await document.exitFullscreen?.();
                }
            } catch (e) { }
        });

        // ======= AJUSTE REAL DO BOTÃO (NÃO QUEBRA OUTRAS PARTES) =======
        function fitButton() {
            // medidas reais
            const mainRect = main.getBoundingClientRect();
            const timerRect = timerWrap.getBoundingClientRect();
            const resetRect = resetBtn.getBoundingClientRect();

            // gaps: pega o --gap do CSS
            const gap = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--gap')) || 14;

            // espaço vertical livre dentro do main pro botão
            // main contém: timerWrap + botão + reset (com gaps entre eles)
            const freeH = mainRect.height - timerRect.height - resetRect.height - (gap * 2);

            // limite pelo width (pra não ficar “gordinho” demais)
            const maxByW = Math.min(mainRect.width * 0.78, 380);

            // o diâmetro ideal: usa o que sobrou em altura, mas respeita width e mínimos
            let size = Math.min(freeH, maxByW);

            // limites seguros
            size = Math.max(170, Math.min(size, 380));

            // aplica
            document.documentElement.style.setProperty('--btn', `${Math.floor(size)}px`);
        }

        // chama em momentos chave
        window.addEventListener('resize', () => {
            const current = running
                ? (elapsed + (performance.now() - startAt) / 1000)
                : elapsed;
            render(current);
            fitButton();
        });

        // alguns mobiles mudam a altura sem disparar resize consistente
        window.addEventListener('orientationchange', () => setTimeout(fitButton, 60));

        // init
        reset();
        // espera layout assentar antes de medir
        requestAnimationFrame(() => {
            fitButton();
            setTimeout(fitButton, 80);
        });
    </script>
</body>

</html>
