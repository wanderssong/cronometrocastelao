<!doctype html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Castelão • Desafio 10.00s</title>

    <style>
        :root {
            /* Paleta Castelão (baseada na logo) */
            --purple-1: #3A0B77;
            --purple-2: #6A22D8;
            --purple-3: #9A63FF;

            --orange-1: #FF6A00;
            --orange-2: #FF8A1A;

            --bg: #05060B;
            --text: rgba(255, 255, 255, .92);
            --muted: rgba(255, 255, 255, .72);

            --stroke: rgba(255, 255, 255, .14);
            --stroke2: rgba(255, 255, 255, .10);

            --shadow: 0 26px 60px rgba(0, 0, 0, .55);
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
        }

        body {
            margin: 0;
            color: var(--text);
            font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
            overflow: hidden;
            /* sem rolagem */
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            touch-action: manipulation;

            background:
                radial-gradient(900px 650px at 20% 15%, rgba(154, 99, 255, .22), transparent 62%),
                radial-gradient(900px 650px at 80% 25%, rgba(255, 138, 26, .18), transparent 62%),
                radial-gradient(1100px 900px at 50% 95%, rgba(106, 34, 216, .18), transparent 62%),
                linear-gradient(180deg, #05060B, #060A14 55%, #05060B);
        }

        .app {
            height: 100svh;
            height: 100dvh;
            display: grid;
            grid-template-rows: auto 1fr auto;
            padding: env(safe-area-inset-top) 14px env(safe-area-inset-bottom) 14px;
            gap: 12px;
            max-width: 980px;
            margin: 0 auto;
        }

        /* Header */
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 10px 12px;
            border-radius: 18px;

            background:
                linear-gradient(180deg, rgba(106, 34, 216, .18), rgba(0, 0, 0, .18));
            border: 1px solid rgba(154, 99, 255, .22);
            box-shadow: 0 10px 30px rgba(0, 0, 0, .38);
            backdrop-filter: blur(10px);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 0;
        }

        .brandLogo {
            width: 50px;
            height: 50px;
            border-radius: 16px;
            object-fit: contain;
            background:
                radial-gradient(30px 30px at 30% 25%, rgba(255, 255, 255, .16), transparent 55%),
                linear-gradient(180deg, rgba(255, 138, 26, .20), rgba(106, 34, 216, .18));
            border: 1px solid rgba(255, 138, 26, .20);
            box-shadow:
                0 14px 26px rgba(0, 0, 0, .40),
                inset 0 0 0 1px rgba(0, 0, 0, .22);
            padding: 6px;
            flex: 0 0 auto;
        }

        .brandText {
            min-width: 0;
            line-height: 1.1;
        }

        .title {
            font-weight: 950;
            font-size: 14px;
            letter-spacing: .6px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .subtitle {
            margin-top: 4px;
            font-size: 12px;
            color: var(--muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .fullBtn {
            flex: 0 0 auto;
            padding: 10px 12px;
            border-radius: 16px;
            border: 1px solid rgba(255, 138, 26, .22);
            background:
                linear-gradient(180deg, rgba(255, 138, 26, .16), rgba(0, 0, 0, .18));
            color: var(--text);
            font-weight: 900;
            letter-spacing: .2px;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 10px 22px rgba(0, 0, 0, .35);
        }

        .fullBtn:active {
            transform: scale(.98);
        }

        /* Main */
        .main {
            min-height: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 14px;
        }

        .timer {
            display: flex;
            align-items: baseline;
            justify-content: center;
            line-height: 1;
            font-weight: 980;
            letter-spacing: 1px;
            text-shadow: 0 14px 44px rgba(0, 0, 0, .70);

            /* brilho roxo/laranja no texto */
            filter: drop-shadow(0 0 22px rgba(154, 99, 255, .18));
        }

        .timer .sec {
            font-size: clamp(70px, 10vw, 150px);
        }

        .timer .dot {
            font-size: clamp(26px, 4vw, 54px);
            margin: 0 10px;
            opacity: .95;
            color: rgba(255, 255, 255, .88);
        }

        .timer .ms {
            font-size: clamp(40px, 6vw, 96px);
            opacity: .98;
            color: rgba(255, 255, 255, .92);
        }

        /* Status pill “Castelão” */
        .statusPill {
            width: min(780px, 92%);
            padding: 12px 14px;
            border-radius: 999px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-weight: 950;
            text-align: center;

            border: 1px solid rgba(154, 99, 255, .22);
            background:
                linear-gradient(90deg, rgba(255, 138, 26, .10), rgba(106, 34, 216, .14));
            box-shadow: 0 14px 26px rgba(0, 0, 0, .35);
        }

        .statusDot {
            width: 10px;
            height: 10px;
            border-radius: 999px;
            background: rgba(255, 255, 255, .65);
            box-shadow: 0 0 0 3px rgba(255, 255, 255, .08);
            flex: 0 0 auto;
        }

        .statusPill.good {
            border-color: rgba(0, 255, 140, .30);
            background: linear-gradient(90deg, rgba(0, 255, 140, .12), rgba(106, 34, 216, .12));
        }

        .statusPill.good .statusDot {
            background: #00ff8a;
            box-shadow: 0 0 0 3px rgba(0, 255, 140, .18);
        }

        .statusPill.warn {
            border-color: rgba(255, 185, 0, .34);
            background: linear-gradient(90deg, rgba(255, 185, 0, .14), rgba(255, 138, 26, .10));
        }

        .statusPill.warn .statusDot {
            background: #ffb900;
            box-shadow: 0 0 0 3px rgba(255, 185, 0, .18);
        }

        .statusPill.bad {
            border-color: rgba(255, 60, 60, .34);
            background: linear-gradient(90deg, rgba(255, 60, 60, .14), rgba(106, 34, 216, .10));
        }

        .statusPill.bad .statusDot {
            background: #ff3b3b;
            box-shadow: 0 0 0 3px rgba(255, 60, 60, .18);
        }

        /* Botão principal “castelo” */
        .bigBtn {
            width: min(520px, 86%);
            max-width: clamp(240px, 42vw, 380px);
            aspect-ratio: 1 / 1;
            border-radius: 999px;
            border: 2px solid rgba(255, 138, 26, .18);

            background:
                radial-gradient(520px 420px at 35% 28%, rgba(255, 255, 255, .16), transparent 55%),
                radial-gradient(520px 420px at 70% 78%, rgba(0, 0, 0, .35), transparent 55%),
                linear-gradient(180deg, rgba(154, 99, 255, .32), rgba(58, 11, 119, .55));

            color: #fff;
            font-weight: 980;
            letter-spacing: 1px;
            font-size: clamp(18px, 3.5vw, 30px);

            display: grid;
            place-items: center;
            position: relative;
            box-shadow: var(--shadow);
            transform: translateZ(0);
        }

        .bigBtn::before {
            /* aro interno “glow” */
            content: "";
            position: absolute;
            inset: 10px;
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, .12);
            box-shadow:
                inset 0 0 0 1px rgba(0, 0, 0, .25),
                0 0 22px rgba(154, 99, 255, .10);
            pointer-events: none;
        }

        .bigBtn:active {
            transform: scale(.985);
        }

        .bigBtn.stop {
            border-color: rgba(255, 60, 60, .22);
            background:
                radial-gradient(520px 420px at 35% 28%, rgba(255, 255, 255, .14), transparent 55%),
                radial-gradient(520px 420px at 70% 78%, rgba(0, 0, 0, .38), transparent 55%),
                linear-gradient(180deg, rgba(255, 60, 60, .34), rgba(106, 34, 216, .32));
        }

        .resetBtn {
            width: min(520px, 86%);
            padding: 13px 16px;
            border-radius: 18px;
            border: 1px solid rgba(154, 99, 255, .20);
            background: rgba(255, 255, 255, .06);
            color: var(--text);
            font-weight: 950;
            letter-spacing: .6px;
            box-shadow: 0 12px 24px rgba(0, 0, 0, .30);
        }

        .resetBtn:active {
            transform: scale(.99);
        }

        .footNote {
            text-align: center;
            font-size: 12px;
            color: var(--muted);
            padding: 4px 10px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .sep {
            opacity: .5;
            margin: 0 6px;
        }

        @media (max-height: 720px) {
            .app {
                gap: 10px;
            }

            .topbar {
                padding: 8px 10px;
            }

            .statusPill {
                padding: 10px 12px;
            }

            .main {
                gap: 10px;
            }

            .resetBtn {
                padding: 12px 14px;
            }
        }

        @media (max-width: 520px) {
            .brandLogo {
                width: 46px;
                height: 46px;
                border-radius: 15px;
            }

            .fullBtn {
                padding: 9px 10px;
                border-radius: 14px;
            }
        }
    </style>
</head>

<body>
    <div class="app">
        <header class="topbar">
            <div class="brand">
                <!-- ✅ sua logo -->
                <img class="brandLogo" src="img/logo.png" alt="Castelão" />
                <div class="brandText">
                    <div class="title">DESAFIO 10.00s</div>
                    <div class="subtitle">10.00 = prêmio TOP • 9.95–10.05 = prêmio menor</div>
                </div>
            </div>

            <button class="fullBtn" id="fullBtn" type="button" aria-label="Tela cheia">⛶ Tela cheia</button>
        </header>

        <main class="main">
            <div class="timer" aria-label="Cronômetro">
                <span class="sec" id="sec">00</span>
                <span class="dot">.</span>
                <span class="ms" id="ms">00</span>
            </div>

            <div class="statusPill" id="statusPill">
                <span class="statusDot"></span>
                <span id="statusText">Toque em INICIAR para começar</span>
            </div>

            <button class="bigBtn" id="toggleBtn" type="button">INICIAR</button>
            <button class="resetBtn" id="resetBtn" type="button">REINICIAR</button>
        </main>

        <footer class="footNote">
            Castelão • Desafio presencial <span class="sep">•</span> Dica: treine no link da bio
        </footer>
    </div>

    <script>
        // ======= CONFIG DO DESAFIO =======
        const TARGET = 10.00;
        const TOL_MIN = 9.95;
        const TOL_MAX = 10.05;

        // ======= ELEMENTOS =======
        const secEl = document.getElementById('sec');
        const msEl = document.getElementById('ms');
        const toggleBtn = document.getElementById('toggleBtn');
        const resetBtn = document.getElementById('resetBtn');
        const statusText = document.getElementById('statusText');
        const statusPill = document.getElementById('statusPill');
        const fullBtn = document.getElementById('fullBtn');

        // ======= ESTADO =======
        let running = false;
        let rafId = null;
        let startAt = 0;
        let elapsed = 0; // sempre guardado arredondado quando PARA

        // ======= HELPERS =======
        function pad2(n) { return String(n).padStart(2, '0'); }

        function round2(n) {
            // ✅ arredondamento consistente (tela = resultado)
            return Math.round((n + Number.EPSILON) * 100) / 100;
        }

        function formatTime(seconds) {
            // SS.CC
            const s = Math.floor(seconds) % 60;
            const cent = Math.round((seconds - Math.floor(seconds)) * 100);
            return { s: pad2(s), c: pad2(Math.max(0, Math.min(99, cent))) };
        }

        function setStatus(type, text) {
            statusPill.classList.remove('good', 'warn', 'bad');
            if (type) statusPill.classList.add(type);
            statusText.textContent = text;
        }

        function render(seconds) {
            const t = formatTime(seconds);
            secEl.textContent = t.s;
            msEl.textContent = t.c;
        }

        function evaluateResult(rounded) {
            const txt = rounded.toFixed(2);

            if (rounded === TARGET) {
                setStatus('good', `CRAVOU ${txt}! 🎉 Prêmio TOP`);
                return;
            }
            if (rounded >= TOL_MIN && rounded <= TOL_MAX) {
                setStatus('warn', `Parou em ${txt} • Prêmio menor`);
                return;
            }
            setStatus('bad', `Parou em ${txt} • Tente de novo`);
        }

        function loop() {
            if (!running) return;

            const now = performance.now();
            const raw = elapsed + (now - startAt) / 1000;

            // ✅ renderiza usando o mesmo arredondamento do resultado
            const rounded = round2(raw);
            render(rounded);

            rafId = requestAnimationFrame(loop);
        }

        function start() {
            if (running) return;
            running = true;

            toggleBtn.textContent = 'PARAR';
            toggleBtn.classList.add('stop');

            setStatus('', 'Valendo! Tenta cravar 10.00');
            startAt = performance.now();
            rafId = requestAnimationFrame(loop);
        }

        function stop() {
            if (!running) return;
            running = false;

            const now = performance.now();
            const raw = elapsed + (now - startAt) / 1000;

            // ✅ congela UM valor e usa ele pra tudo
            elapsed = round2(raw);

            if (rafId) cancelAnimationFrame(rafId);
            rafId = null;

            toggleBtn.textContent = 'INICIAR';
            toggleBtn.classList.remove('stop');

            render(elapsed);
            evaluateResult(elapsed);
        }

        function reset() {
            running = false;
            if (rafId) cancelAnimationFrame(rafId);
            rafId = null;

            elapsed = 0;
            startAt = 0;

            toggleBtn.textContent = 'INICIAR';
            toggleBtn.classList.remove('stop');

            render(0);
            setStatus('', 'Toque em INICIAR para começar');
        }

        toggleBtn.addEventListener('click', () => running ? stop() : start());
        resetBtn.addEventListener('click', reset);

        fullBtn.addEventListener('click', async () => {
            try {
                const root = document.documentElement;
                if (!document.fullscreenElement) {
                    await root.requestFullscreen?.();
                    if (screen.orientation && screen.orientation.lock) {
                        try { await screen.orientation.lock('portrait'); } catch (e) { }
                    }
                } else {
                    await document.exitFullscreen?.();
                }
            } catch (e) { }
        });

        window.addEventListener('resize', () => {
            const current = running
                ? round2(elapsed + (performance.now() - startAt) / 1000)
                : elapsed;
            render(current);
        });

        reset();
    </script>
</body>

</html>
